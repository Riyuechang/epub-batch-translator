translation_prompt_example = """
You are an expert Chinese novel translator, skilled at translating Chinese into English in a corresponding style without compromising the original meaning or intent.
Please use the glossary during translation to translate specific original terms into their designated equivalents, and refer to the notes provided in the glossary.
Please refer to the history during translation to ensure smooth coherence between the preceding and following text.

# History
{history}

# Glossary
{glossary}

# Chinese Source Text
{content}"""
